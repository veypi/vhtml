<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="description" content="runtime 生命周期探针" details="用于验证 mount active deactive dispose 的最小组件" />
  <title>Runtime Probe Card</title>
</head>
<style>
  body {
    display: block;
    padding: 20px;
    border-radius: 20px;
    background: linear-gradient(160deg, #0f172a, #1e293b);
    color: #e2e8f0;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .title {
    margin: 0;
    font-size: 20px;
  }

  .state {
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(148, 163, 184, 0.18);
    font-size: 12px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }

  .metric {
    padding: 12px;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.08);
  }

  .metric-label {
    display: block;
    font-size: 12px;
    color: #94a3b8;
  }

  .metric-value {
    display: block;
    margin-top: 4px;
    font-size: 24px;
    font-weight: 700;
  }

  .content {
    padding: 14px 16px;
    border-radius: 14px;
    background: rgba(15, 23, 42, 0.45);
    color: #cbd5e1;
  }
</style>
<body>
  <div class="header">
    <h3 class="title">{{ title }}</h3>
    <span class="state">{{ status }}</span>
  </div>
  <div class="grid">
    <div class="metric">
      <span class="metric-label">mount</span>
      <span class="metric-value">{{ mountCount }}</span>
    </div>
    <div class="metric">
      <span class="metric-label">active</span>
      <span class="metric-value">{{ activeCount }}</span>
    </div>
    <div class="metric">
      <span class="metric-label">deactive</span>
      <span class="metric-value">{{ deactiveCount }}</span>
    </div>
    <div class="metric">
      <span class="metric-label">dispose</span>
      <span class="metric-value">{{ disposeCount }}</span>
    </div>
  </div>
  <div class="content">
    <vslot></vslot>
  </div>
</body>
<script setup>
  title = 'Runtime Probe';
  status = 'idle';
  mountCount = 0;
  activeCount = 0;
  deactiveCount = 0;
  disposeCount = 0;
</script>
<script>
  mountCount += 1;
  status = 'mounted';
</script>
<script active>
  activeCount += 1;
  status = 'active';
</script>
<script deactive>
  deactiveCount += 1;
  status = 'inactive';
</script>
<script dispose>
  disposeCount += 1;
  status = 'disposed';
</script>
</html>
