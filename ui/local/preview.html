<!DOCTYPE html>

<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="组件预览" details="vhtml 组件预览页面，支持代码编辑和实时预览" />
  <title>{{ $t('preview.title') }}</title>
</head>
<style>
  body {
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
  }

  .preview-page {
    padding: var(--spacing-lg);
    max-width: 1400px;
    margin: 0 auto;
  }

  /* 页面头部 */
  .page-header {
    margin-bottom: var(--spacing-xl);
    text-align: center;
  }

  .page-header h1 {
    font-size: var(--font-size-2xl);
    color: var(--text-color);
    margin-bottom: var(--spacing-sm);
    font-weight: var(--font-weight-semibold);
  }

  .page-header p {
    color: var(--text-color-secondary);
    font-size: var(--font-size-md);
  }

  /* 预览组件容器 */
  .preview-container {
    position: relative;
    border-radius: var(--radius-2xl);
    overflow: hidden;
    background: #fff;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), 0 2px 8px rgba(0, 0, 0, 0.04);
  }

  /* 悬浮模式切换按钮组 */
  .floating-controls {
    position: absolute;
    top: 12px;
    right: 12px;
    display: flex;
    gap: 2px;
    z-index: 100;
    background: rgba(255, 255, 255, 0.9);
    padding: 3px;
    border-radius: var(--radius-lg);
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
    border: 1px solid rgba(0, 0, 0, 0.06);
  }

  /* 图标按钮 */
  .icon-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border: none;
    background: transparent;
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all 0.2s ease;
    color: var(--text-color-secondary);
  }

  .icon-btn:hover {
    background: rgba(102, 126, 234, 0.08);
    color: var(--color-primary);
  }

  .icon-btn svg {
    width: 14px;
    height: 14px;
  }

  /* 预览主体区域 */
  .preview-body {
    display: flex;
  }

  /* 左右分栏模式 */
  .preview-body.split-mode {
    flex-direction: row;
  }

  .preview-body.split-mode .code-panel,
  .preview-body.split-mode .preview-panel {
    flex: 1;
    width: 50%;
  }

  .preview-body.split-mode .preview-panel {
    border-right: 1px solid rgba(0, 0, 0, 0.06);
  }

  /* 切换模式 */
  .preview-body.switch-mode {
    flex-direction: column;
  }

  .preview-body .code-panel {
    min-height: 400px;
  }

  .preview-body.switch-mode .code-panel,
  .preview-body.switch-mode .preview-panel {
    width: 100%;
    height: 100%;
  }

  .preview-body.switch-mode .code-panel.hidden,
  .preview-body.switch-mode .preview-panel.hidden {
    display: none;
  }

  /* 代码面板 */
  .code-panel {
    display: flex;
    flex-direction: column;
    background: #1e1e1e;
  }

  .code-editor {
    flex: 1;
    padding: var(--spacing-md);
    font-family: 'JetBrains Mono', 'Consolas', 'Monaco', 'Courier New', monospace;
    font-size: 14px;
    line-height: 1.7;
    color: #d4d4d4;
    background: #1e1e1e;
    border: none;
    resize: none;
    outline: none;
    white-space: pre;
    overflow: auto;
    tab-size: 2;
  }

  /* 预览面板 */
  .preview-panel {
    display: flex;
    flex-direction: column;
    background: #fafafa;
  }

  .preview-content {
    flex: 1;
    padding: var(--spacing-lg);
    overflow: auto;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 预览盒子 */
  .preview-box {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 空状态 */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-color-secondary);
    text-align: center;
  }

  .empty-state svg {
    width: 80px;
    height: 80px;
    margin-bottom: var(--spacing-lg);
    opacity: 0.3;
    stroke-width: 1;
  }

  .empty-state-text {
    font-size: var(--font-size-md);
    color: var(--text-color-secondary);
  }

  /* 响应式 */
  @media (max-width: 768px) {
    .preview-page {
      padding: var(--spacing-sm);
    }

    .preview-body {}

    .preview-body.split-mode {
      flex-direction: column;
    }

    .preview-body.split-mode .code-panel,
    .preview-body.split-mode .preview-panel {
      width: 100%;
      height: 50%;
    }

    .preview-body.split-mode .preview-panel {
      border-right: none;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }

    .floating-controls {
      top: 8px;
      right: 8px;
      padding: 2px;
    }

    .icon-btn {
      width: 26px;
      height: 26px;
    }

    .icon-btn svg {
      width: 13px;
      height: 13px;
    }
  }

  /* 嵌入模式样式 */
  .preview-page.embedded {
    padding: 0;
  }

  .preview-page.embedded .preview-container {
    box-shadow: none;
    border-radius: var(--radius-lg);
  }

  .preview-page.embedded .preview-body {}

  .preview-page.embedded .floating-controls {
    top: 8px;
    right: 8px;
  }
</style>

<body>
  <div class="preview-page" :class="{embedded: isEmbedded}">
    <div class="page-header" v-if="!isEmbedded">
      <h1>{{ $t('preview.title') }}</h1>
      <p>{{ $t('preview.subtitle') }}</p>
    </div>

    <!-- 预览组件 -->
    <div class="preview-container">
      <!-- 悬浮模式切换按钮 -->
      <div class="floating-controls">
        <!-- 复制按钮 -->
        <button class="icon-btn" @click="copyCode" :title="$t('preview.copy')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
        </button>
        <!-- 视图切换按钮（仅在 switch 模式下显示） -->
        <button v-if="displayMode === 'switch'" class="icon-btn" @click="toggleSwitchView"
          :title="switchView === 'code' ? $t('preview.showPreview') : $t('preview.showCode')">
          <svg v-if="switchView === 'code'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <svg v-else viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="16 18 22 12 16 6"></polyline>
            <polyline points="8 6 2 12 8 18"></polyline>
          </svg>
        </button>
        <!-- 模式切换按钮：split/switch 合并（最右） -->
        <button class="icon-btn" @click="toggleMode" :title="displayMode === 'split' ? $t('preview.mode.switch') : $t('preview.mode.split')">
          <!-- split 模式图标 -->
          <svg v-if="displayMode === 'split'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="12" y1="3" x2="12" y2="21"></line>
          </svg>
          <!-- switch 模式图标 -->
          <svg v-else viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <polyline points="9 3 9 21 15 21"></polyline>
          </svg>
        </button>
      </div>

      <!-- 预览主体 -->
      <div class="preview-body" :class="bodyClass">
        <!-- 预览面板 -->
        <div class="preview-panel" :class="{hidden: switchView === 'code'}">
          <div class="preview-content">
            <div class="preview-box">
              <div class="empty-state" v-show='!code'>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                  <line x1="9" y1="9" x2="15" y2="9"></line>
                  <line x1="9" y1="13" x2="15" y2="13"></line>
                  <line x1="9" y1="17" x2="11" y2="17"></line>
                </svg>
                <span class="empty-state-text">{{ $t('preview.emptyState') }}</span>
              </div>
              <div class="preview-render-box" style="width: 100%; height: 100%;"></div>
            </div>
          </div>
        </div>

        <!-- 代码面板 -->
        <div class="code-panel" :class="{hidden: switchView === 'preview'}">
          <textarea class="code-editor" v:value="code" @input="updateCode" :readonly="code ? true : false"
            spellcheck="false" placeholder="<!-- 输入 HTML 代码 -->"></textarea>
        </div>
      </div>
    </div>
  </div>
</body>
<script setup>
  // 判断是否为嵌入模式（传入了 code）
  isEmbedded = () => {
    return !!code;
  };
  displayMode = 'switch';

  switchView = 'preview';

  code = '';
  bodyClass = () => {
    return displayMode === 'split' ? 'split-mode' : 'switch-mode';
  };

  setMode = (mode) => {
    displayMode = mode;
    if (mode === 'switch') {
      switchView = 'preview';
    }
  };

  // 切换模式
  toggleMode = () => {
    setMode(displayMode === 'split' ? 'switch' : 'split');
  };

  // 切换视图（切换模式下使用）
  toggleSwitchView = () => {
    switchView = switchView === 'code' ? 'preview' : 'code';
  };

  // 更新代码（仅在非嵌入模式下）
  updateCode = (e) => {
    if (!code) {
      code = e.target.value;
    }
  };

  // 复制代码
  copyCode = () => {
    if (!code) return;
    navigator.clipboard.writeText(code).then(() => {
      $message.success($t('preview.copySuccess'));
    }).catch(() => {
      $message.error($t('preview.copyError'));
    });
  };
</script>
<script>
  $watch(() => code, async () => {
    let dom = $node.querySelector('.preview-render-box')
    dom.innerHTML = ''
    await $vhtml.parseRaw(dom, {}, {}, code)
  })
</script>

</html>
