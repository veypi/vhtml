<!DOCTYPE html>

<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="vhtml 示例" details="vhtml 框架功能演示和代码示例，包含数据绑定、条件渲染、列表渲染等" />
  <title>{{ $t('examples.title') }}</title>
</head>
<style>
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    line-height: 1.6;
    color: var(--text-color);
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 var(--spacing-xl);
  }

  /* 页面标题 */
  .page-header {
    text-align: center;
    padding: var(--spacing-2xl) 0 var(--spacing-xl);
  }

  .page-header h1 {
    font-size: var(--font-size-2xl);
    margin-bottom: var(--spacing-sm);
    color: var(--text-color);
  }

  .page-header p {
    color: var(--text-color-tertiary);
    font-size: var(--font-size-lg);
  }

  /* 示例卡片 */
  .examples-grid {
    display: grid;
    gap: var(--spacing-xl);
    padding-bottom: var(--spacing-2xl);
  }

  .example-card {
    background: #fff;
    border-radius: var(--radius-xl);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  .example-header {
    padding: var(--spacing-md) var(--spacing-lg);
    background: var(--bg-color);
    border-bottom: 1px solid var(--border-color);
  }

  .example-header h3 {
    margin: 0;
    font-size: var(--font-size-lg);
    color: var(--text-color);
  }

  .example-body {
    padding: var(--spacing-lg);
  }

  .example-preview {
    background: var(--bg-color);
    border-radius: var(--radius-lg);
    padding: var(--spacing-lg);
    margin-bottom: var(--spacing-lg);
  }

  .example-code {
    background: #1a1a2e;
    border-radius: var(--radius-lg);
    padding: var(--spacing-lg);
    overflow-x: auto;
  }

  .example-code pre {
    margin: 0;
    color: #fff;
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: var(--font-size-sm);
    line-height: 1.6;
  }

  /* 交互样式 */
  .counter-box {
    display: flex;
    align-items: center;
    gap: var(--spacing-md);
  }

  .counter-value {
    font-size: 32px;
    font-weight: var(--font-weight-bold);
    color: var(--color-primary);
    min-width: 60px;
    text-align: center;
  }

  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: var(--radius-md);
    background: var(--color-primary);
    color: #fff;
    cursor: pointer;
    font-size: var(--font-size-md);
    transition: background var(--transition-fast);
  }

  .btn:hover {
    background: var(--color-primary-hover);
  }

  .btn-danger {
    background: var(--color-danger);
  }

  .btn-danger:hover {
    background: var(--color-danger-hover);
  }

  .input-field {
    padding: 10px 14px;
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    font-size: var(--font-size-md);
    width: 200px;
  }

  .todo-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .todo-item {
    display: flex;
    align-items: center;
    gap: var(--spacing-sm);
    padding: var(--spacing-sm);
    background: #fff;
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    margin-bottom: var(--spacing-xs);
  }

  .todo-item.completed span {
    text-decoration: line-through;
    color: var(--text-color-disabled);
  }

  .todo-input-group {
    display: flex;
    gap: var(--spacing-sm);
    margin-bottom: var(--spacing-md);
  }

  .tab-buttons {
    display: flex;
    gap: var(--spacing-xs);
    margin-bottom: var(--spacing-md);
  }

  .tab-btn {
    padding: 8px 16px;
    border: 1px solid var(--border-color);
    background: #fff;
    border-radius: var(--radius-md);
    cursor: pointer;
    font-size: var(--font-size-md);
    transition: all var(--transition-fast);
  }

  .tab-btn.active {
    background: var(--color-primary);
    color: #fff;
    border-color: var(--color-primary);
  }

  .tab-content {
    padding: var(--spacing-lg);
    background: var(--bg-color);
    border-radius: var(--radius-lg);
  }
</style>

<body>
  <!-- 页面标题 -->
  <header class="page-header">
    <div class="container">
      <h1>{{ $t('examples.demoList.counter') }}</h1>
      <p>{{ $t('examples.subtitle') }}</p>
    </div>
  </header>

  <!-- 示例列表 -->
  <div class="container examples-grid">
    <!-- 计数器示例 -->
    <div class="example-card">
      <div class="example-header">
        <h3>{{ $t('examples.demoList.counter') }}</h3>
      </div>
      <div class="example-body">
        <page-preview v:code="counterCode"></page-preview>
      </div>
    </div>

    <!-- 双向绑定示例 -->
    <div class="example-card">
      <div class="example-header">
        <h3>{{ $t('examples.demoList.twoWay') }}</h3>
      </div>
      <div class="example-body">
        <page-preview v:code="twoWayCode"></page-preview>
      </div>
    </div>

    <!-- 条件渲染示例 -->
    <div class="example-card">
      <div class="example-header">
        <h3>{{ $t('examples.demoList.condition') }}</h3>
      </div>
      <div class="example-body">
        <page-preview v:code="conditionCode"></page-preview>
      </div>
    </div>

    <!-- 列表渲染示例 -->
    <div class="example-card">
      <div class="example-header">
        <h3>{{ $t('examples.demoList.list') }}</h3>
      </div>
      <div class="example-body">
        <page-preview v:code="listCode"></page-preview>
      </div>
    </div>

    <!-- Tab 切换示例 -->
    <div class="example-card">
      <div class="example-header">
        <h3>{{ $t('examples.demoList.tabs') }}</h3>
      </div>
      <div class="example-body">
        <page-preview v:code="tabsCode"></page-preview>
      </div>
    </div>
  </div>
</body>
<script setup>
  // 计数器示例代码
  counterCode = `<style>
  .counter-box {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px;
  }
  .counter-value {
    font-size: 32px;
    font-weight: bold;
    color: #667eea;
    min-width: 60px;
    text-align: center;
  }
  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    background: #667eea;
    color: #fff;
    cursor: pointer;
    font-size: 16px;
  }
  .btn:hover {
    background: #5568d3;
  }
</style>
<div class="counter-box">
  <button class="btn" @click="count--">-</button>
  <span class="counter-value">{{ count }}</span>
  <button class="btn" @click="count++">+</button>
</div>
<script setup>
  count = 0;
<\/script>`;

  // 双向绑定示例代码
  twoWayCode = `<style>
  .two-way-box {
    padding: 20px;
  }
  .input-field {
    padding: 10px 14px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
    width: 200px;
  }
  .result {
    margin-top: 12px;
    color: #666;
  }
  .result strong {
    color: #667eea;
  }
</style>
<div class="two-way-box">
  <input class="input-field" v:value="inputText" placeholder="请输入内容...">
  <p class="result">你输入了：<strong>{{ inputText }}</strong></p>
</div>
<script setup>
  inputText = '';
<\/script>`;

  // 条件渲染示例代码
  conditionCode = `<style>
  .condition-box {
    padding: 20px;
  }
  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    background: #667eea;
    color: #fff;
    cursor: pointer;
    font-size: 14px;
  }
  .content {
    margin-top: 16px;
    padding: 16px;
    background: #e0e7ff;
    border-radius: 8px;
    color: #333;
  }
</style>
<div class="condition-box">
  <button class="btn" @click="isVisible = !isVisible">
    {{ isVisible ? '隐藏内容' : '显示内容' }}
  </button>
  <div class="content" v-if="isVisible">
    🎉 这是条件渲染的内容！
  </div>
</div>
<script setup>
  isVisible = true;
<\/script>`;

  // 列表渲染示例代码
  listCode = `<style>
  .list-box {
    padding: 20px;
  }
  .input-group {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .input-field {
    padding: 10px 14px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
    flex: 1;
  }
  .btn {
    padding: 10px 16px;
    border: none;
    border-radius: 6px;
    background: #667eea;
    color: #fff;
    cursor: pointer;
    font-size: 14px;
  }
  .btn-danger {
    background: #ef4444;
  }
  .todo-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .todo-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    margin-bottom: 8px;
  }
  .todo-item.completed span {
    text-decoration: line-through;
    color: #999;
  }
  .todo-item span {
    flex: 1;
  }
</style>
<div class="list-box">
  <div class="input-group">
    <input class="input-field" v:value="newTodo" placeholder="添加待办事项...">
    <button class="btn" @click="addTodo()">添加</button>
  </div>
  <ul class="todo-list">
    <li v-for="(todo, index) in todos" class="todo-item" :class="{completed: todo.done}">
      <input type="checkbox" :checked="todo.done" @change="todo.done = !todo.done">
      <span>{{ todo.text }}</span>
      <button class="btn btn-danger" @click="removeTodo(index)">删除</button>
    </li>
  </ul>
</div>
<script setup>
  newTodo = '';
  todos = [
    {text: '学习 vhtml', done: true},
    {text: '创建项目', done: false},
    {text: '发布应用', done: false}
  ];
  addTodo = () => {
    if (newTodo.trim()) {
      todos.push({text: newTodo, done: false});
      newTodo = '';
    }
  };
  removeTodo = (index) => {
    todos.splice(index, 1);
  };
<\/script>`;

  // Tab 切换示例代码
  tabsCode = `<style>
  .tabs-box {
    padding: 20px;
  }
  .tab-buttons {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .tab-btn {
    padding: 8px 16px;
    border: 1px solid #ddd;
    background: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: #667eea;
    color: #fff;
    border-color: #667eea;
  }
  .tab-content {
    padding: 20px;
    background: #f5f5f5;
    border-radius: 8px;
  }
</style>
<div class="tabs-box">
  <div class="tab-buttons">
    <button class="tab-btn" :class="{active: activeTab === 'home'}" @click="activeTab = 'home'">首页</button>
    <button class="tab-btn" :class="{active: activeTab === 'profile'}" @click="activeTab = 'profile'">个人</button>
    <button class="tab-btn" :class="{active: activeTab === 'settings'}" @click="activeTab = 'settings'">设置</button>
  </div>
  <div class="tab-content">
    <div v-if="activeTab === 'home'">🏠 这是首页内容</div>
    <div v-if="activeTab === 'profile'">👤 这是个人资料内容</div>
    <div v-if="activeTab === 'settings'">⚙️ 这是设置内容</div>
  </div>
</div>
<script setup>
  activeTab = 'home';
<\/script>`;
</script>

</html>
