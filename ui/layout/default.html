<!DOCTYPE html>

<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="默认布局"
      details="vhtml 官方网站的默认布局，包含导航栏和页脚"
    />
    <title>默认布局</title>
  </head>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    /* 导航栏 */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--spacing-md) var(--spacing-xl);
      background: #fff;
      border-bottom: 1px solid var(--border-color);
      box-shadow: var(--shadow-sm);
    }
    .logo {
      font-size: var(--font-size-2xl);
      font-weight: var(--font-weight-bold);
      color: var(--color-primary);
      text-decoration: none;
      transition: color var(--transition-fast);
    }
    .logo:hover {
      color: var(--color-primary-hover);
    }
    .nav-links {
      display: flex;
      gap: var(--spacing-xl);
    }
    .nav-links a {
      color: var(--text-color-secondary);
      text-decoration: none;
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-medium);
      transition: color var(--transition-fast);
      padding: var(--spacing-sm) 0;
      position: relative;
    }
    .nav-links a:hover,
    .nav-links a.active {
      color: var(--color-primary);
    }
    .nav-links a.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--color-primary);
      border-radius: var(--radius-full);
    }
    /* 主内容区 */
    .main-content {
      flex: 1;
    }
    /* 页脚 */
    .footer {
      background: var(--text-color);
      color: var(--text-color-disabled);
      padding: var(--spacing-xl);
      text-align: center;
    }
    .footer a {
      color: var(--text-color-tertiary);
      text-decoration: none;
      transition: color var(--transition-fast);
    }
    .footer a:hover {
      color: var(--bg-color);
    }
  </style>
  <body>
    <!-- 导航栏 -->
    <nav class="navbar">
      <a href="/" class="logo">vhtml</a>
      <div class="nav-links">
        <a href="/docs" :class="{active: currentRoute === 'docs'}">文档</a>
        <a href="/examples" :class="{active: currentRoute === 'examples'}">示例</a>
        <a href="/ecosystem" :class="{active: currentRoute === 'ecosystem'}">生态</a>
        <a href="/about" :class="{active: currentRoute === 'about'}">关于</a>
      </div>
    </nav>

    <!-- 主内容插槽 -->
    <main class="main-content">
      <vslot></vslot>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
      <p>vhtml © 2025 | <a href="https://github.com/veypi/vhtml" target="_blank">GitHub</a></p>
    </footer>
  </body>
  <script setup>
    currentRoute = '';
  </script>
  <script>
    // 根据当前路径设置激活的导航项
    path = window.location.pathname;
    if (path.startsWith('/docs')) {
      $data.currentRoute = 'docs';
    } else if (path.startsWith('/examples')) {
      $data.currentRoute = 'examples';
    } else if (path.startsWith('/ecosystem')) {
      $data.currentRoute = 'ecosystem';
    } else if (path.startsWith('/about')) {
      $data.currentRoute = 'about';
    }
  </script>
</html>
