<!DOCTYPE html>

<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="默认布局" details="vhtml 官方网站的默认布局，包含导航栏和页脚" />
  <title>默认布局</title>
</head>
<style>
  body {
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* 导航栏 */
  .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: var(--spacing-md) var(--spacing-xl);
    background: #fff;
    border-bottom: 1px solid var(--border-color);
    box-shadow: var(--shadow-sm);
  }

  .logo {
    font-size: var(--font-size-2xl);
    font-weight: var(--font-weight-bold);
    color: var(--color-primary);
    text-decoration: none;
    transition: color var(--transition-fast);
  }

  .logo:hover {
    color: var(--color-primary-hover);
  }

  .nav-links {
    display: flex;
    gap: var(--spacing-xl);
  }

  .nav-links a {
    color: var(--text-color-secondary);
    text-decoration: none;
    font-size: var(--font-size-md);
    font-weight: var(--font-weight-medium);
    transition: color var(--transition-fast);
    padding: var(--spacing-sm) 0;
    position: relative;
  }

  .nav-links a:hover,
  .nav-links a.active {
    color: var(--color-primary);
  }

  .nav-links a.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--color-primary);
    border-radius: var(--radius-full);
  }

  /* 语言切换器 */
  .lang-switcher {
    display: flex;
    align-items: center;
    gap: var(--spacing-sm);
    margin-left: var(--spacing-lg);
  }

  .lang-btn {
    padding: 4px 10px;
    border: 1px solid var(--border-color);
    background: #fff;
    border-radius: var(--radius-md);
    cursor: pointer;
    font-size: var(--font-size-sm);
    color: var(--text-color-secondary);
    transition: all var(--transition-fast);
  }

  .lang-btn:hover {
    border-color: var(--color-primary);
    color: var(--color-primary);
  }

  .lang-btn.active {
    background: var(--color-primary);
    color: #fff;
    border-color: var(--color-primary);
  }

  /* 主内容区 */
  .main-content {
    flex: 1;
    width: 100%;
  }

  /* 页脚 */
  .footer {
    background: var(--text-color);
    color: var(--text-color-disabled);
    padding: var(--spacing-xl);
    text-align: center;
  }

  .footer a {
    color: var(--text-color-tertiary);
    text-decoration: none;
    transition: color var(--transition-fast);
  }

  .footer a:hover {
    color: var(--bg-color);
  }
</style>

<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <a href="/" class="logo">vhtml</a>
    <div class="nav-links">
      <a href="/docs">{{ $t('common.docs') }}</a>
      <a href="/examples">{{ $t('common.examples') }}</a>
      <a href="/runtime-smoke">Smoke</a>
      <a href="/ecosystem">{{ $t('common.ecosystem') }}</a>
      <a href="/about">{{ $t('common.about') }}</a>
      <div class="lang-switcher">
        <button class="lang-btn" :class="{active: currentLang === 'zh-CN'}" @click="switchLang('zh-CN')">中文</button>
        <button class="lang-btn" :class="{active: currentLang === 'en-US'}" @click="switchLang('en-US')">EN</button>
      </div>
    </div>
  </nav>

  <!-- 主内容插槽 -->
  <vslot class="main-content"></vslot>

  <!-- 页脚 -->
  <footer class="footer">
    <p>{{ $t('common.copyright', { github: 'GitHub' }) }} | <a href="https://github.com/veypi/vhtml"
        target="_blank">GitHub</a></p>
  </footer>
</body>
<script setup>
  $env.$i18n.load(await(await fetch($env.scoped + '/langs.json')).json())
  currentLang = $i18n.getLocale() || 'zh-CN';
  switchLang = (lang) => {
    if (lang === currentLang) return;
    currentLang = lang;
    $i18n.setLocale(lang);
  };
</script>
<script>
</script>

</html>
